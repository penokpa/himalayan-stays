name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel older runs for the same ref so a fast-follow push doesn't queue behind
# an in-flight one.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        # Reads the pnpm version from packageManager in the root package.json.
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Prisma client must exist before tests/typecheck — tests import from
      # @/lib/prisma even though they mock it.
      - name: Generate Prisma client
        run: pnpm --filter @himalayan-stays/shared exec prisma generate

      - name: Test booking app
        run: pnpm --filter @himalayan-stays/booking test

      - name: Test PMS app
        run: pnpm --filter @himalayan-stays/pms test

      - name: Typecheck booking app
        run: pnpm --filter @himalayan-stays/booking exec tsc --noEmit
